# @desc Exercises step rendering, matrix job names, runs-on normalization, and secret aggregation.
name: Step Rendering

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Java ${{ matrix.java }}
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        java: [17, 21, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@8f4b7f84864484a7bf31766abe9204da3cbe65b3 # v4.1.1
        with:
          fetch-depth: 0
          token: ${{ secrets.CHECKOUT_TOKEN }}
      - uses: actions/setup-java@5896cecc08fd8a1fbdfaf517e29b571164b031f7 # v4.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
      - run: |
          # Build the project
          ./mvnw -B clean verify
        continue-on-error: true
      - id: upload
        run: ./scripts/upload.sh "${{ vars.UPLOAD_BUCKET }}"

  deploy:
    name: Deploy ${{ matrix.target.env }}
    runs-on:
      group: deploy-runners
      labels: [linux, arm64]
    needs: [build]
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/main')
    strategy:
      matrix:
        target:
          - env: staging
            url: https://staging.example.com
          - env: production
            url: https://example.com
    steps:
      - name: Push image
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ vars.REGISTRY_USER }}" --password-stdin
          docker push example/app
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE_SIGNING_KEY: ${{ secrets.IMAGE_SIGNING_KEY }}
      - name: Notify
        if: ${{ vars.NOTIFY_CHANNEL && secrets.SLACK_WEBHOOK }}
        run: curl -X POST "${{ secrets.SLACK_WEBHOOK }}"
        continue-on-error: true
      - name: >
          Report deploy status:
          ${{ matrix.target.env }}
        run: ./scripts/report.sh

  verify:
    name: Verify ${{ matrix.case }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        case: [a, b]
        include:
          - case: c
    steps:
      - name: Run checks
        run: make verify
