# @desc Main CI pipeline for building and testing the application.
# @since v1.0.0
# @see https://docs.example.com/ci
# @secret DEPLOY_KEY - SSH key used for deployment
# @env CI - Must be set to "true" in repository settings
name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # @desc Compile the application and produce build artifacts.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      # @desc Check out the repository at the triggering commit.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make build

  # @desc Runs the full test suite against the compiled artifacts.
  # @secret NPM_TOKEN - Required for private package access
  # @env DATABASE_URL - Connection string for the test database
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # @desc Execute unit and integration tests.
      # @output test-results {path} - Path to the JUnit XML report
      - name: Run tests
        id: tests
        run: npm test

  # @desc Builds the production Docker image and pushes to registry.
  # @deprecated Use the new "build-v2" workflow instead.
  # @example
  #   To trigger manually:
  #   gh workflow run ci.yml -f deploy=true
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Build image
        run: docker build -t app .

      - name: Push image
        run: docker push app
