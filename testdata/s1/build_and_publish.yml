# @desc Builds the artifacts for every architecture and publishes them.
name: Build and Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      channel:
        required: false
        type: string

jobs:
  # @desc Compile the artifacts for each target architecture.
  build-matrix:
    uses: ./.github/workflows/build.yml
    with:
      arch: amd64,arm64

  # @desc Upload the built artifacts to the package registry.
  publish:
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain
        uses: ./actions/setup

      - name: Publish
        run: make publish
